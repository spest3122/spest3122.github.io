<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具面板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --border-hover: #444;
    --text-primary: #f0ede8;
    --text-secondary: #888;
    --text-muted: #444;
    --purple: #a78bfa;
    --green: #6ee7b7;
    --coral: #fb923c;
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(167,139,250,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(110,231,183,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
  }

  header {
    margin-bottom: 2.5rem;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-size: 26px;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card-purple::before { background: radial-gradient(ellipse 80% 60% at 0% 50%, rgba(167,139,250,0.08), transparent); }
  .card-green::before  { background: radial-gradient(ellipse 80% 60% at 0% 50%, rgba(110,231,183,0.08), transparent); }
  .card-coral::before  { background: radial-gradient(ellipse 80% 60% at 0% 50%, rgba(251,146,60,0.08), transparent); }

  .card:hover {
    border-color: var(--border-hover);
    transform: translateX(3px);
  }

  .card:hover::before { opacity: 1; }

  .icon-wrap {
    width: 40px;
    height: 40px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }

  .card-purple .icon-wrap { background: rgba(167,139,250,0.12); }
  .card-green  .icon-wrap { background: rgba(110,231,183,0.12); }
  .card-coral  .icon-wrap { background: rgba(251,146,60,0.12); }

  .icon-wrap svg { display: block; }

  .card-body { flex: 1; min-width: 0; }

  .card-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .card-purple .card-label { color: var(--purple); }
  .card-green  .card-label { color: var(--green); }
  .card-coral  .card-label { color: var(--coral); }

  .card-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .card-url {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .arrow {
    flex-shrink: 0;
    color: var(--text-muted);
    transition: color 0.2s, transform 0.2s;
  }

  .card:hover .arrow {
    color: var(--text-secondary);
    transform: translate(2px, -2px);
  }

  footer {
    margin-top: 2rem;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    text-align: center;
    letter-spacing: 0.05em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  header    { animation: fadeUp 0.5s ease both; }
  .card:nth-child(1) { animation: fadeUp 0.5s 0.1s ease both; }
  .card:nth-child(2) { animation: fadeUp 0.5s 0.18s ease both; }
  .card:nth-child(3) { animation: fadeUp 0.5s 0.26s ease both; }
  footer    { animation: fadeUp 0.5s 0.4s ease both; }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="container">
  <header>
    <p class="eyebrow">// 工具面板</p>
    <h1>快速入口</h1>
  </header>

  <div class="cards">

    <a class="card card-purple"
       href="https://nonohsu.app.n8n.cloud/form/eeb8ee1b-c735-4361-bb40-b5f21b908689"
       target="_blank" rel="noopener">
      <div class="icon-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </div>
      <div class="card-body">
        <p class="card-label">更新</p>
        <p class="card-title">提交表單</p>
        <p class="card-url">nonohsu.app.n8n.cloud</p>
      </div>
      <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <path d="M7 17L17 7M7 7h10v10"/>
      </svg>
    </a>

    <a class="card card-coral"
       href="https://spest3122.github.io/off_days_viewer.html"
       target="_blank" rel="noopener">
      <div class="icon-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="#fb923c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </div>
      <div class="card-body">
        <p class="card-label">測試</p>
        <p class="card-title">假日檢視器</p>
        <p class="card-url">spest3122.github.io</p>
      </div>
      <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <path d="M7 17L17 7M7 7h10v10"/>
      </svg>
    </a>

  </div>

  <footer>三個快速連結 &mdash; 點擊即可開啟</footer>
</div>
</body>
</html>
